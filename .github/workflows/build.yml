name: Build Shadowgram

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run tauri build

      - name: List Windows bundle outputs
        shell: pwsh
        run: |
          if (Test-Path "target/release/bundle") {
            Get-ChildItem "target/release/bundle" -Recurse | Select-Object FullName
          } else {
            Write-Error "target/release/bundle was not created"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: shadowgram-windows
          path: |
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - run: npm run tauri build

      - name: List Linux bundle outputs
        run: |
          if [ -d target/release/bundle ]; then
            find target/release/bundle -type f | sort
          else
            echo "target/release/bundle was not created" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: shadowgram-linux
          path: |
            target/release/bundle/**/*.deb
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-24.04

    env:
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Prepare Android environment
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "NDK_HOME=$(find "$ANDROID_HOME/ndk" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Initialize Android project
        run: |
          rm -rf src-tauri/gen/android
          npm run tauri android init -- --ci

      - name: Build Android artifacts
        run: npm run tauri android build

      - name: List Android outputs
        run: |
          if [ -d src-tauri/gen/android/app/build/outputs ]; then
            find src-tauri/gen/android/app/build/outputs -type f | sort
          else
            echo "Android output directory was not created" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: shadowgram-android
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error
