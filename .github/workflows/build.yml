name: Build Shadowgram

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run tauri build

      - name: List Windows bundle outputs
        shell: pwsh
        run: |
          if (Test-Path "target/release/bundle") {
            Get-ChildItem "target/release/bundle" -Recurse | Select-Object FullName
          } else {
            Write-Error "target/release/bundle was not created"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: shadowgram-windows
          path: |
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - run: npm run tauri build

      - name: List Linux bundle outputs
        run: |
          if [ -d target/release/bundle ]; then
            find target/release/bundle -type f | sort
          else
            echo "target/release/bundle was not created" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: shadowgram-linux
          path: |
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
          if-no-files-found: error
